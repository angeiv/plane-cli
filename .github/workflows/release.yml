name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check tag matches package version
        run: node scripts/prepare-release.mjs --tag "${GITHUB_REF_NAME}" --verify-only
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Run test suite
        run: pnpm test

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Build release output
        run: pnpm run build
  package:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release output
        run: pnpm run build

      - name: Create release assets
        run: node scripts/prepare-release.mjs --tag "${GITHUB_REF_NAME}" --out-dir release-artifacts
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-artifacts

      - name: Publish or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" -R "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-artifacts/* --clobber -R "${GH_REPO}"
          else
            gh release create "${TAG_NAME}" release-artifacts/* --generate-notes --verify-tag -R "${GH_REPO}"
          fi
